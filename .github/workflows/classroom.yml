# Thin caller for standard Python code assignments.
# Delegates all logic to the shared reusable workflow in workflows-central.
#
# After forking to a classroom org, update the 'uses:' line below
# to point to your org's fork of workflows-central:
#   uses: <your-org>/workflows-central/...@<version>
#
# Prerequisites (set at the classroom org level):
#   vars.INSTRUCTOR_ORG  — GitHub org/user hosting grader images
#   secrets.CR_PAT, secrets.GOOGLE_API_KEY (or other API keys), etc.

name: Autograding Tests
on:
  - push
  - workflow_dispatch
  - repository_dispatch
  - pull_request

permissions:
  checks: read
  actions: write
  contents: read
  issues: write   # follow-up issue tracking

jobs:
  grade:
    uses: kangwonlee/workflows-central/.github/workflows/classroom-reusable.yml@v3.2.0
    with:
      instructor_org: ${{ vars.INSTRUCTOR_ORG }}
    secrets: inherit
